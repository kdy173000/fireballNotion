<div class="dilution-calculator">
  <h2 class="calc-title">희석비&nbsp;</h2>

  <div class="calc-body">
    <div class="calc-input">

      <label>희석비 <span class="required-star">*</span></label>

        <div class="field-label-row">
          <label>총 용량</label>
          <div class="unit-inside" data-target="totalAmount">
            <button type="button" class="unit-btn active" data-unit="ml">ml</button>
            <button type="button" class="unit-btn" data-unit="L">L</button>
          </div>
        </div>
        <input type="text" id="totalAmount" placeholder="" inputmode="decimal">
      </div>

      <div class="field-col">
        <div class="field-label-row">
          <label>물</label>
          <div class="unit-inside" data-target="waterAmount">
            <button type="button" class="unit-btn active" data-unit="ml">ml</button>
            <button type="button" class="unit-btn" data-unit="L">L</button>
          </div>
        </div>
        <input type="text" id="waterAmount" placeholder="" inputmode="decimal">
      </div>

      <div class="field-col">
        <div class="field-label-row">
          <label>원액</label>
          <div class="unit-inside" data-target="shampooAmount">
            <button type="button" class="unit-btn active" data-unit="ml">ml</button>
            <button type="button" class="unit-btn" data-unit="L">L</button>
          </div>
        </div>
        <input type="text" id="shampooAmount" placeholder="" inputmode="decimal">
      </div>

    </div>
  </div>
