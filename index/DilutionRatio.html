<html>
<head>
<link rel="stylesheet" as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>

<body>
<div class="dilution-calculator">
  <h2 class="calc-title">
    <a href="https://kdy173000.github.io/fireballNotion/" class="title-link">희석비</a>
  </h2>

  <div class="calc-body">
    <div class="ratio-section">
      <label>희석비 <span class="required-star">*</span></label>
      <div class="ratio-input">
        <span>1 :</span>
        <input type="text" id="waterRatio" placeholder="10" inputmode="decimal">
      </div>
    </div>

    <div class="vdivider"></div>

    <div class="fields-section">
      <div class="field-col">
        <div class="field-label-row">
          <label>총 용량</label>
          <div class="unit-inside" data-target="totalAmount">
            <button type="button" class="unit-btn active" data-unit="ml">ml</button>
            <button type="button" class="unit-btn" data-unit="L">L</button>
          </div>
        </div>
        <input type="text" id="totalAmount" placeholder="" inputmode="decimal">
      </div>

      <div class="field-col">
        <label>물</label>
        <input type="text" id="waterAmount" placeholder="" inputmode="decimal">
      </div>

      <div class="field-col">
        <label>원액</label>
        <input type="text" id="shampooAmount" placeholder="" inputmode="decimal">
      </div>
    </div>
  </div>
</div>

<style>
:root {
  color-scheme: light dark;
  --ui-font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  --calc-border: #d9d9d9;
  --divider: #e5e5e5;
  --text-main: #111111;
  --text-sub: #444444;
  --input-bg: transparent;
  --input-border: #cfcfcf;
  --placeholder: #9a9a9a;
}

@media (prefers-color-scheme: dark) {
  :root {
    --calc-border: #6b6b6b;
    --divider: #555555;
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --input-bg: transparent;
    --input-border: #666666;
    --placeholder: #9b9b9b;
  }
}

.dilution-calculator {
  font-family: var(--ui-font);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 20px 28px;
  max-width: 760px;
  margin: auto;
  background: transparent;
  color: var(--text-main);
  box-sizing: border-box;
}

.calc-title {
  text-align: center;
  margin: 0 0 18px;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-main);
}

.title-link {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font: inherit;
}

.title-link:hover { cursor: pointer; }

.calc-body {
  display: flex;
  align-items: center;
  gap: 0;
}

.ratio-section {
  flex-shrink: 0;
  width: 150px;
}

.vdivider {
  width: 1px;
  height: 64px;
  background: var(--divider);
  margin: 0 20px;
  flex-shrink: 0;
}

.fields-section {
  flex: 1;
  display: flex;
  gap: 12px;
}

.field-col {
  flex: 1;
  min-width: 0;
}

label {
  display: block;
  color: var(--text-sub);
  font-weight: 500;
  margin-bottom: 4px;
  font-size: 14px;
}

.field-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.field-label-row label {
  margin-bottom: 0;
}

.ratio-input {
  display: flex;
  align-items: center;
  gap: 8px;
}

.ratio-input span {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
}

.required-star {
  color: #e03131 !important;
  font-size: 13px;
  font-weight: 700;
}

input {
  width: 100%;
  padding: 9px 10px;
  margin: 0;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 15px;
  font-family: var(--ui-font);
  background: var(--input-bg);
  color: var(--text-main);
  box-sizing: border-box;
  outline: none;
}

input::placeholder { color: var(--placeholder); }

input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.unit-inside {
  display: inline-flex;
  align-items: center;
}

.unit-btn {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-family: var(--ui-font);
  font-size: 12px;
  font-weight: 500;
  padding: 0 7px;
  height: 22px;
  cursor: pointer;
  line-height: 1;
}

.unit-btn + .unit-btn {
  border-left: 1px solid var(--input-border);
}

.unit-btn.active {
  color: var(--text-main);
  font-weight: 700;
}

@media (max-width: 600px) {
  .dilution-calculator { padding: 17px; }
  .calc-title { font-size: 22px; margin-bottom: 14px; margin-top: 0; }
  .calc-body { flex-direction: column; align-items: stretch; gap: 0; }
  .ratio-section { width: 100%; }
  .vdivider { display: none; }
  .fields-section { flex-direction: column; gap: 0; margin-top: 16px; border-top: 1px solid var(--divider); padding-top: 14px; }
  .field-col { margin-bottom: 10px; }
  label { font-size: 15px; }
  input { font-size: 15px; }
}
</style>

<script>
const waterRatioEl    = document.getElementById("waterRatio");
const totalAmountEl   = document.getElementById("totalAmount");
const waterAmountEl   = document.getElementById("waterAmount");
const shampooAmountEl = document.getElementById("shampooAmount");

const units = { totalAmount: "ml", waterAmount: "ml", shampooAmount: "ml" };
const rawMl = { totalAmount: NaN, waterAmount: NaN, shampooAmount: NaN };

let isUpdating = false;

function parseNumber(value) {
  if (value == null) return NaN;
  let s = String(value).trim();
  if (s === "") return NaN;

  if (/\d,\d/.test(s) && !/\d\.\d/.test(s)) {
    s = s.replace(/\./g, "").replace(",", ".");
  } else {
    s = s.replace(/,/g, "");
  }

  return parseFloat(s);
}

function formatNumber(value) {
  if (!isFinite(value)) return "";
  const rounded = Math.round(value * 100) / 100;
  return rounded.toLocaleString("ko-KR", {
    minimumFractionDigits: 0,
    maximumFractionDigits: 2
  });
}

function toMl(fieldId, value) {
  if (!isFinite(value)) return NaN;
  return units[fieldId] === "L" ? value * 1000 : value;
}

function fromMl(fieldId, ml) {
  if (!isFinite(ml)) return NaN;
  return units[fieldId] === "L" ? ml / 1000 : ml;
}

function setField(el, fieldId, ml) {
  rawMl[fieldId] = ml;
  el.value = isFinite(ml) ? formatNumber(fromMl(fieldId, ml)) : "";
}

function clearField(el, fieldId) {
  rawMl[fieldId] = NaN;
  el.value = "";
}

function getRatio() {
  const r = parseNumber(waterRatioEl.value);
  return isFinite(r) && r >= 0 ? r : NaN;
}

function recalcFrom(source) {
  const ratio = getRatio();
  if (isNaN(ratio)) return;

  const ml = rawMl[source];
  if (!isFinite(ml) || ml < 0) return;

  let totalMl, waterMl, shampooMl;

  if (source === "totalAmount") {
    totalMl = ml;
    shampooMl = totalMl / (1 + ratio);
    waterMl = totalMl - shampooMl;
  } else if (source === "waterAmount") {
    waterMl = ml;
    shampooMl = ratio > 0 ? waterMl / ratio : 0;
    totalMl = shampooMl + waterMl;
  } else {
    shampooMl = ml;
    waterMl = shampooMl * ratio;
    totalMl = shampooMl + waterMl;
  }

  isUpdating = true;

  if (source !== "totalAmount") setField(totalAmountEl, "totalAmount", totalMl);
  if (source !== "waterAmount") setField(waterAmountEl, "waterAmount", waterMl);
  if (source !== "shampooAmount") setField(shampooAmountEl, "shampooAmount", shampooMl);

  isUpdating = false;
}

waterRatioEl.addEventListener("input", () => {
  if (isUpdating) return;

  const source = ["totalAmount", "waterAmount", "shampooAmount"].find(id => isFinite(rawMl[id]));
  if (source) recalcFrom(source);
});

function handleFieldInput(el, fieldId) {
  el.addEventListener("input", () => {
    if (isUpdating) return;

    const ml = toMl(fieldId, parseNumber(el.value));
    rawMl[fieldId] = ml;

    if (isFinite(ml) && ml >= 0) {
      recalcFrom(fieldId);
    } else {
      isUpdating = true;
      ["totalAmount", "waterAmount", "shampooAmount"]
        .filter(id => id !== fieldId)
        .forEach(id => clearField(document.getElementById(id), id));
      isUpdating = false;
    }
  });
}

handleFieldInput(totalAmountEl, "totalAmount");
handleFieldInput(waterAmountEl, "waterAmount");
handleFieldInput(shampooAmountEl, "shampooAmount");

document.querySelectorAll(".unit-inside").forEach(toggle => {
  const targetId = toggle.dataset.target;
  const inputEl = document.getElementById(targetId);

  toggle.querySelectorAll(".unit-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const newUnit = btn.dataset.unit;
      if (newUnit === units[targetId]) return;

      units[targetId] = newUnit;

      toggle.querySelectorAll(".unit-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      if (isFinite(rawMl[targetId])) {
        inputEl.value = formatNumber(fromMl(targetId, rawMl[targetId]));
      }
    });
  });
});
</script>
</body>
</html>
