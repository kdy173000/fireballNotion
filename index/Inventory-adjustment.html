<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 차이 계산기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
</head>
<body>

<div class="stock-calculator">
  <div class="calc-header">
    <h2 class="calc-title">
      <a href="https://kdy173000.github.io/fireballNotion/" class="title-link">재고 계산기</a>
    </h2>
  </div>

  <div class="calc-input">

    <div class="main-row">

      <!-- 왼쪽 3칸 -->
      <div class="fields-row">
        <div class="field">
          <label>실제 재고 <span class="required-star">*</span></label>
          <input type="text" id="actualStock" class="transparent-input" placeholder="실제 재고 입력" inputmode="numeric">
        </div>
        <div class="field">
          <label>전산 재고 <span class="required-star">*</span></label>
          <input type="text" id="systemStock" class="transparent-input" placeholder="전산 재고 입력" inputmode="numeric">
        </div>
        <div class="field">
          <label>출고 예정 <span class="optional-label">선택</span></label>
          <input type="text" id="plannedOut" class="transparent-input" placeholder="0" inputmode="numeric">
        </div>
      </div>

      <!-- 세로 구분선 (PC만) -->
      <div class="vertical-divider"></div>

      <!-- 결과 (PC만) -->
      <div class="result-field">
        <label>결과</label>
        <div class="result-wrapper">
          <span id="resultBadge" class="badge"></span>
          <input type="text" id="resultStock" placeholder="결과값" readonly>
        </div>
      </div>

    </div>

    <!-- 가로 구분선 (모바일만) -->
    <div class="group-divider"></div>

    <!-- 결과 (모바일만) -->
    <div class="result-field-mobile">
      <label>결과</label>
      <div class="result-wrapper">
        <span id="resultBadgeMobile" class="badge"></span>
        <input type="text" id="resultStockMobile" placeholder="결과값" readonly>
      </div>
    </div>

  </div>
</div>

<style>
:root {
  --ui-font: "Pretendard", sans-serif;
  --bg-page: #f5f5f5;
  --bg-card: transparent;
  --calc-border: #d9d9d9;
  --divider: #e5e5e5;
  --text-main: #111;
  --text-sub: #444;
  --input-bg: #ffffff;
  --input-border: #cfcfcf;
  --input-readonly-bg: rgba(0,0,0,0.03);
  --placeholder: #9a9a9a;
  --blue: #228be6;
  --red: #e03131;
  --gray: #868e96;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-page: #1a1a1a;
    --bg-card: transparent;
    --calc-border: #3a3a3a;
    --divider: #333333;
    --text-main: #f0f0f0;
    --text-sub: #aaaaaa;
    --input-bg: #2e2e2e;
    --input-border: #444444;
    --input-readonly-bg: rgba(255,255,255,0.04);
    --placeholder: #666666;
    --blue: #74b9ff;
    --red: #ff6b6b;
    --gray: #adb5bd;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--ui-font);
  background: var(--bg-page);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

.stock-calculator {
  font-family: var(--ui-font);
  background: var(--bg-card);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 20px 24px 24px;
  width: 100%;
  max-width: 800px;
}

.calc-header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
}

.calc-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-main);
}

/* 숨겨진 링크 - 겉으론 그냥 제목처럼 보임 */
.title-link {
  color: inherit;
  text-decoration: none;
  cursor: default;
}

label {
  display: block;
  margin-bottom: 3px;
  font-size: 13px;
  color: var(--text-sub);
}

input {
  width: 100%;
  padding: 8px 10px;
  margin-bottom: 0;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 15px;
  font-family: var(--ui-font);
  background: var(--input-bg);
  color: var(--text-main);
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

input::placeholder { color: var(--placeholder); }
input[readonly] { background: var(--input-readonly-bg); cursor: default; }
input:focus { outline: none; border-color: #888; }
.transparent-input { background: transparent; }

.required-star { color: #e03131; }

.optional-label {
  font-size: 11px;
  color: var(--gray);
  background: rgba(0,0,0,0.06);
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
  font-weight: 500;
}

@media (prefers-color-scheme: dark) {
  .optional-label { background: rgba(255,255,255,0.08); }
}

/* ── 모바일 기본 ── */
.main-row { display: contents; }

.fields-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field input { margin-bottom: 0; }

.vertical-divider { display: none; }
.result-field { display: none; }

.group-divider {
  height: 1px;
  background: var(--divider);
  margin: 12px 0;
}

.result-field-mobile { display: block; }

/* ── PC (600px+) ── */
@media (min-width: 600px) {
  .main-row {
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  .fields-row {
    flex-direction: row;
    gap: 12px;
    flex: 3;
  }

  .vertical-divider {
    display: block;
    width: 1px;
    background: var(--divider);
    align-self: stretch;
    margin: 0 16px;
    flex-shrink: 0;
  }

  .result-field {
    display: block;
    flex: 1;
    min-width: 120px;
  }

  .group-divider { display: none; }
  .result-field-mobile { display: none; }
}

/* 결과 공통 */
.result-wrapper { position: relative; }

.result-wrapper input { padding-left: 56px; }

.badge {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 6px;
  border-radius: 5px;
  display: none;
  white-space: nowrap;
}

.badge.in   { background: rgba(34,139,230,0.12); color: var(--blue); display: inline-block; }
.badge.out  { background: rgba(224,49,49,0.12);  color: var(--red);  display: inline-block; }
.badge.zero { background: rgba(134,142,150,0.12);color: var(--gray); display: inline-block; }
</style>

<script>
const actualEl  = document.getElementById("actualStock");
const systemEl  = document.getElementById("systemStock");
const plannedEl = document.getElementById("plannedOut");

const resultEl  = document.getElementById("resultStock");
const badgeEl   = document.getElementById("resultBadge");
const resultElM = document.getElementById("resultStockMobile");
const badgeElM  = document.getElementById("resultBadgeMobile");

function formatNumber(v) {
  return Number(v).toLocaleString("ko-KR");
}

function parseNumber(v) {
  if (!v && v !== 0) return NaN;
  return parseFloat(String(v).replace(/,/g, ""));
}

function handleInputFormat(e) {
  const raw = e.target.value.replace(/[^0-9]/g, "");
  e.target.value = raw ? formatNumber(raw) : "";
  calculate();
}

function setResult(el, badge, diff) {
  if (diff > 0) {
    el.value = formatNumber(diff);
    badge.textContent = "입고+";
    badge.className = "badge in";
  } else if (diff < 0) {
    el.value = formatNumber(Math.abs(diff));
    badge.textContent = "출고-";
    badge.className = "badge out";
  } else {
    el.value = "0";
    badge.textContent = "일치";
    badge.className = "badge zero";
  }
}

function calculate() {
  const actual  = parseNumber(actualEl.value);
  const system  = parseNumber(systemEl.value);
  const planned = parseNumber(plannedEl.value) || 0;

  if (!isFinite(actual) || !isFinite(system)) {
    resultEl.value  = ""; badgeEl.className  = "badge";
    resultElM.value = ""; badgeElM.className = "badge";
    return;
  }

  const diff = (actual + planned) - system;
  setResult(resultEl,  badgeEl,  diff);
  setResult(resultElM, badgeElM, diff);
}

actualEl.addEventListener("input", handleInputFormat);
systemEl.addEventListener("input", handleInputFormat);
plannedEl.addEventListener("input", handleInputFormat);
</script>

</body>
</html>
