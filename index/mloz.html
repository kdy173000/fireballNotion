<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  </head>
  <body>
    <div class="dilution-calculator">
  <h2 class="calc-title"><a href="https://kdy173000.github.io/fireballNotion/" class="title-link">ml ↔ oz</a></h2>
  <div class="calc-body">
    <div class="calc-row">
      <div class="calc-field">
        <label for="mlAmount">ml</label>
        <input type="text" id="mlAmount" placeholder="500" inputmode="decimal">
      </div>
      <div class="calc-field">
        <label for="ozAmount">oz</label>
        <input type="text" id="ozAmount" placeholder="16.91" inputmode="decimal">
      </div>
    </div>
  </div>
</div>
<style>
:root{
  color-scheme: light dark;
  --ui-font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  --calc-border: #d9d9d9;
  --text-main: #111111;
  --text-sub: #444444;
  --input-border: #cfcfcf;
  --placeholder: #9a9a9a;
}
@media (prefers-color-scheme: dark){
  :root{
    --calc-border: #6b6b6b;
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --input-border: #666666;
    --placeholder: #9b9b9b;
  }
}
.dilution-calculator{
  font-family: var(--ui-font);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 22px 30px 20px;
  max-width: 700px;
  margin: auto;
  background: transparent;
  color: var(--text-main);
}
.calc-title{
  text-align: center;
  margin: 0 0 18px 0;
  font-size: 26px;
  font-weight: 700;
}
.title-link{
  color: inherit;
  text-decoration: none;
  cursor: pointer;
}
.title-link:hover{
  cursor: pointer;
}
.calc-row{
  display: flex;
  gap: 20px;
}
.calc-field{
  flex: 1;
}
label{
  display: block;
  color: var(--text-sub);
  font-weight: 500;
  margin-bottom: 6px;
}
input{
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 16px;
  font-family: var(--ui-font);
  background: transparent;
  color: var(--text-main);
  outline: none;
  box-sizing: border-box;
}
input::placeholder{
  color: var(--placeholder);
}
@media (max-width: 768px){
  .dilution-calculator{
    padding: 18px;
  }
  .calc-title{
    font-size: 22px;
  }
  .calc-row{
    flex-direction: column;
    gap: 0;
  }
  .calc-field{
    margin-bottom: 12px;
  }
  input{
    font-size: 15px;
  }
}
</style>
<script>
const mlInput = document.getElementById("mlAmount");
const ozInput = document.getElementById("ozAmount");
let isUpdating = false;
mlInput.addEventListener("input", () => {
  if (isUpdating) return;
  isUpdating = true;
  const ml = parseFloat(mlInput.value.replace(",", "."));
  ozInput.value = !isNaN(ml) ? (ml * 0.033814).toFixed(2) : "";
  isUpdating = false;
});
ozInput.addEventListener("input", () => {
  if (isUpdating) return;
  isUpdating = true;
  const oz = parseFloat(ozInput.value.replace(",", "."));
  mlInput.value = !isNaN(oz) ? (oz * 29.5735).toFixed(0) : "";
  isUpdating = false;
});
</script>
</body></html>
