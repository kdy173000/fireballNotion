<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }
    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 36px;
    }
    p {
      margin-bottom: 40px;
      color: #aaa;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }
    .menu-card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 35px 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.25s;
    }
    .menu-card:hover {
      transform: translateY(-6px);
      background: #252525;
      border-color: #ff3b3b;
    }
    .menu-card h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .menu-card span {
      color: #aaa;
      font-size: 14px;
    }

    /* 모바일 */
    @media (max-width: 600px) {
      body {
        padding: 20px 16px;
        align-items: flex-start;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 6px;
      }
      p {
        font-size: 13px;
        margin-bottom: 20px;
      }
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .menu-card {
        padding: 20px 12px;
        border-radius: 14px;
      }
      .menu-card h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }
      .menu-card span {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FIREBALL Tools</h1>
    <p>사용할 계산기를 선택하세요</p>
    <div class="menu-grid">
      <a href="https://kdy173000.github.io/fireballNotion/index/mloz.html" class="menu-card">
        <h2>ml ↔ oz</h2>
      </a>
      <a href="https://kdy173000.github.io/fireballNotion/index/clock.html" class="menu-card">
        <h2>나라별 시간</h2>
      </a>
      <a href="https://kdy173000.github.io/fireballNotion/index/DilutionRatio.html" class="menu-card">
        <h2>희석비 계산</h2>
      </a>
      <a href="https://kdy173000.github.io/fireballNotion/index/Inventory-adjustment.html" class="menu-card">
        <h2>재고계산</h2>
      </a>
      <a href="https://kdy173000.github.io/fireballNotion/index/KRW.html" class="menu-card">
        <h2>환율 계산</h2>
      </a>
    </div>
  </div>
</body>
</html>
