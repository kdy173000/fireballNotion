<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIREBALL Tools</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 36px;
    }

    p {
      margin-bottom: 40px;
      color: #aaa;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .menu-card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 35px 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.25s;
    }

    .menu-card:hover {
      transform: translateY(-6px);
      background: #252525;
      border-color: #ff3b3b;
    }

    .menu-card h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .menu-card span {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FIREBALL Tools</h1>
    <p>사용할 계산기를 선택하세요</p>

    <div class="menu-grid">
      <a href="https://kdy173000.github.io/index/mloz.html" class="menu-card">
        <h2>ml ↔ oz</h2>
        <span>용량 변환 계산기</span>
      </a>

      <a href="https://kdy173000.github.io/index/clocks.html" class="menu-card">
        <h2>Clocks</h2>
        <span>시간 확인</span>
      </a>

      <a href="https://kdy173000.github.io/index/dilutionRatio.html" class="menu-card">
        <h2>희석비 계산기</h2>
        <span>희석 비율 계산</span>
      </a>

      <a href="https://kdy173000.github.io/index/Clock.html" class="menu-card">
        <h2>재고계산기</h2>
        <span>재고 수량 계산</span>
      </a>
    </div>
  </div>
</body>
</html>
