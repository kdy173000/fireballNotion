<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>

  <style>
    :root {
      color-scheme: light dark;

      --bg: transparent;
      --text-main: #111111;
      --text-sub: #666666;

      --card-bg: rgba(0, 0, 0, 0.04);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-hover: rgba(0, 0, 0, 0.06);

      --hover-border: #ff3b3b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: transparent;
        --text-main: #ffffff;
        --text-sub: #aaaaaa;

        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(255, 255, 255, 0.08);
        --card-hover: rgba(255, 255, 255, 0.08);

        --hover-border: #ff3b3b;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 30px;

      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 36px;
      color: var(--text-main);
    }

    p {
      margin-bottom: 40px;
      color: var(--text-sub);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .menu-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;

      padding: 35px 20px;

      text-decoration: none;
      color: var(--text-main);

      transition: 0.25s;
      backdrop-filter: blur(6px);
    }

    .menu-card:hover {
      transform: translateY(-6px);
      background: var(--card-hover);
      border-color: var(--hover-border);
    }

    .menu-card h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .menu-card span {
      color: var(--text-sub);
      font-size: 14px;
    }

    /* 모바일 */
    @media (max-width: 600px) {
      body {
        padding: 20px 16px;
        align-items: center;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 6px;
      }

      p {
        font-size: 13px;
        margin-bottom: 20px;
      }

      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .menu-card {
        padding: 20px 12px;
        border-radius: 14px;
      }

      .menu-card h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }

      .menu-card span {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FIREBALL Tools</h1>
    <p>사용할 계산기를 선택하세요</p>

    <div class="menu-grid">

      <a href="https://kdy173000.github.io/fireballNotion/index/mloz.html" class="menu-card">
        <h2>ml ↔ oz</h2>
      </a>

      <a href="https://kdy173000.github.io/fireballNotion/index/clock.html" class="menu-card">
        <h2>나라별 시간</h2>
      </a>

      <a href="https://kdy173000.github.io/fireballNotion/index/DilutionRatio.html" class="menu-card">
        <h2>희석비 계산</h2>
      </a>

      <a href="https://kdy173000.github.io/fireballNotion/index/Inventory-adjustment.html" class="menu-card">
        <h2>재고계산</h2>
      </a>

      <a href="https://kdy173000.github.io/fireballNotion/index/KRW.html" class="menu-card">
        <h2>환율 계산</h2>
      </a>

    </div>
  </div>
</body>
</html>
